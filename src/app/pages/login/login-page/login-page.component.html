<div class="login-wrapper">

  <!-- Fondo con partículas decorativas -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>

  <div class="login-card">

    <!-- Línea superior de acento -->
    <div class="card-accent-line"></div>

    <!-- Header -->
    <div class="login-header">
      <div class="logo-box">
        <img src="logo.png" alt="Logo SCA" class="logo-img"
             #logoImg (error)="logoImg.hidden = true">
        <span class="logo-fallback" *ngIf="logoImg.hidden">S</span>
      </div>
      <h1 class="login-title">SCA</h1>
      <p class="login-subtitle">Sistema de Control de Asignaciones</p>
    </div>

    <!-- Error global -->
    <div class="alert-error" *ngIf="errorMessage" [@fadeIn]>
      <i class="bi bi-exclamation-circle"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onLogin()" #loginFormRef="ngForm" novalidate>

      <!-- Usuario -->
      <div class="form-group" [class.has-error]="userField.invalid && userField.touched">
        <label class="form-label" for="username">Usuario</label>
        <div class="input-icon-wrap">
          <i class="bi bi-person input-icon"></i>
          <input
            id="username"
            type="text"
            class="form-control-sca"
            placeholder="nombre.apellido"
            [(ngModel)]="credentials.username"
            name="username"
            #userField="ngModel"
            required
            autocomplete="username"
          />
        </div>
        <span class="field-error" *ngIf="userField.invalid && userField.touched">
          El usuario es requerido
        </span>
      </div>

      <!-- Contraseña -->
      <div class="form-group" [class.has-error]="passField.invalid && passField.touched">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            class="form-control-sca"
            placeholder="••••••••"
            [(ngModel)]="credentials.password"
            name="password"
            #passField="ngModel"
            required
            autocomplete="current-password"
          />
          <button
            type="button"
            class="input-icon-action"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
        </div>
        <span class="field-error" *ngIf="passField.invalid && passField.touched">
          La contraseña es requerida
        </span>
      </div>

      <!-- Opciones -->
      <div class="form-options">
        <label class="check-container">
          <input type="checkbox" [(ngModel)]="rememberMe" name="remember" />
          <span class="checkmark"></span>
          <span>Recordarme</span>
        </label>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn-primary-sca"
        [disabled]="isLoading"
        [class.is-loading]="isLoading"
      >
        <span *ngIf="!isLoading">
          Iniciar Sesión
          <i class="bi bi-box-arrow-in-right ms-2"></i>
        </span>
        <span *ngIf="isLoading" class="btn-loader">
          <span class="spinner"></span>
          Verificando...
        </span>
      </button>

    </form>

  </div>

  <footer class="login-footer">
    Sistema de Control de Asignaciones (SCA) &copy; {{ currentYear }}
  </footer>

</div>
